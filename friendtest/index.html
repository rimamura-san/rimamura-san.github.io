<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF 友だち機能個別ボタン検証</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background-color: #f3f4f6;
      color: #1f2937;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 16px;
    }
    h2 {
      margin-top: 0;
      color: #111827;
      font-size: 1.25rem;
    }
    p {
      font-size: 0.9rem;
      color: #4b5563;
      line-height: 1.4;
    }
    button {
      background-color: #06C755; /* LINE Green */
      color: white;
      border: none;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      margin-bottom: 12px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #05b04c;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    #btn-request {
      background-color: #1e3a8a; /* 友だち追加ボタンはディープブルー */
    }
    #btn-request:hover {
      background-color: #172554;
    }
    .status {
      font-family: monospace;
      font-size: 0.85rem;
      padding: 10px;
      border-radius: 6px;
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .error {
      color: #b91c1c;
      background-color: #fef2f2;
      border-color: #fca5a5;
    }
    .success {
      color: #15803d;
      background-color: #f0fdf4;
      border-color: #bbf7d0;
    }
  </style>
</head>
<body>

  <h1>LIFF 友だち機能検証</h1>

  <!-- 💡 リアルタイムJSエラー検出モニター -->
  <div class="card" style="border: 2px solid #ef4444; background-color: #fef2f2;">
    <h3 style="color: #b91c1c; margin-top: 0; font-size: 1rem;">🛠️ エラーリアルタイム監視モニター</h3>
    <div id="debug-monitor" class="status error">エラーは検出されていません。正常にJavaScriptが動作しています。</div>
  </div>

  <!-- 1. 初期化状態 -->
  <div class="card">
    <h2>1. LIFF 初期状態</h2>
    <div id="init-status" class="status">初期化中...</div>
  </div>

  <!-- 2. liff.getFriendship() -->
  <div class="card">
    <h2>2. 友だちかどうか確認</h2>
    <p><code>liff.getFriendship()</code> を実行して、公式アカウントと現在友だち（ブロックなし）かどうかを取得します。</p>
    <button id="btn-get" disabled>友だち状態をチェックする</button>
    <div id="get-status" class="status">結果はここに表示されます</div>
  </div>

  <!-- 3. liff.requestFriendship() -->
  <div class="card">
    <h2>3. 友だち追加画面を出す</h2>
    <p><code>liff.requestFriendship()</code> を実行して、友だち追加ポップアップ（またはブロック解除の案内）を強制的に呼び出します。</p>
    <button id="btn-request" disabled>友だち追加ポップアップを起動</button>
    <div id="request-status" class="status">結果はここに表示されます</div>
  </div>

  <!-- LINE LIFF SDK CDN -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ----------------------------------------------------
    // 【最重要】LIFF IDを、完全に安全な半角文字列として埋め込んでいます
    // ----------------------------------------------------
    const MY_LIFF_ID = "2010552506-d2NuY6Vo";

    const monitorEl = document.getElementById("debug-monitor");
    const initStatusEl = document.getElementById("init-status");
    const btnGet = document.getElementById("btn-get");
    const getStatusEl = document.getElementById("get-status");
    const btnRequest = document.getElementById("btn-request");
    const requestStatusEl = document.getElementById("request-status");

    // モニター表示用のエラー表示関数
    function showMonitorError(title, detail) {
      monitorEl.innerHTML = `<strong>【${title}】</strong><br>${detail}`;
      monitorEl.className = "status error";
    }

    // 全体のJavaScriptエラーを強制キャッチ
    window.onerror = function(message, source, lineno, colno, error) {
      showMonitorError("JS実行エラー", `${message}<br><small>場所: ${source} (行: ${lineno}, 文字目: ${colno})</small>`);
      return false;
    };

    window.onunhandledrejection = function(event) {
      showMonitorError("Promiseエラー", event.reason ? (event.reason.message || event.reason) : "非同期エラーが発生しました");
    };

    // DOM読み込み時の file:// 起動チェック
    document.addEventListener("DOMContentLoaded", () => {
      if (window.location.protocol === 'file:') {
        showMonitorError("動作環境エラー", "ローカルファイルを直接ダブルクリックして開いています。サーバーにアップロードしてからアクセスしてください。");
      }
    });

    // LIFF初期化
    liff.init({ liffId: MY_LIFF_ID })
      .then(() => {
        initStatusEl.textContent = "LIFF初期化に成功しました！\nLIFF ID: " + liff.id;
        initStatusEl.className = "status success";
        monitorEl.textContent = "正常に稼働中。エラーはありません。";
        monitorEl.className = "status success";

        // ボタンの有効化
        btnGet.disabled = false;
        btnRequest.disabled = false;
      })
      .catch((err) => {
        initStatusEl.textContent = "初期化失敗: " + err.code + " - " + err.message;
        initStatusEl.className = "status error";
        showMonitorError("liff.init() 失敗", `コード: ${err.code}<br>メッセージ: ${err.message}`);
      });

    // 1. 友だち状態の確認
    btnGet.addEventListener("click", () => {
      getStatusEl.textContent = "確認中...";
      getStatusEl.className = "status";

      liff.getFriendship()
        .then((data) => {
          if (data.friendFlag) {
            getStatusEl.textContent = "友だちです！ (friendFlag: true)";
            getStatusEl.className = "status success";
          } else {
            getStatusEl.textContent = "友だちではない、またはブロックされています (friendFlag: false)";
            getStatusEl.className = "status error";
          }
        })
        .catch((err) => {
          getStatusEl.textContent = "エラー: " + err.code + " - " + err.message;
          getStatusEl.className = "status error";
        });
    });

    // 2. 友だち追加ポップアップを起動
    btnRequest.addEventListener("click", () => {
      requestStatusEl.textContent = "起動中...";
      requestStatusEl.className = "status";

      liff.requestFriendship()
        .then(() => {
          requestStatusEl.textContent = "ポップアップ処理が終了しました。もう一度、上の「友だち状態をチェックする」ボタンを押して最新状態を再確認してください。";
          requestStatusEl.className = "status success";
        })
        .catch((err) => {
          requestStatusEl.className = "status error";
          if (err.code === 'FORBIDDEN') {
            requestStatusEl.textContent = "エラー (FORBIDDEN)\n考えられる原因:\n・LIFFアプリの画面サイズ設定が「Full」になっていません。\n・LINE公式アカウントがチャネルに正しくリンクされていません。";
          } else {
            requestStatusEl.textContent = "エラー: " + err.code + " - " + err.message;
          }
        });
    });

  </script>
</body>
</html>
